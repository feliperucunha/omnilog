<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OMNILOG — Log Everything in One Place</title>
    <meta name="description" content="Track movies, TV, games, books, anime, manga and more in one place. Log what you watch, read and play with ratings and reviews." />
    <!-- Favicon -->
    <link rel="icon" href="/logo-dark.png" type="image/png" />
    <link rel="icon" href="/logo.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, iMessage, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="OMNILOG" />
    <meta property="og:title" content="OMNILOG — Log Everything in One Place" />
    <meta property="og:description" content="Track movies, TV, games, books, anime, manga and more in one place. Log what you watch, read and play with ratings and reviews." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:locale" content="en" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="OMNILOG — Log Everything in One Place" />
    <meta name="twitter:description" content="Track movies, TV, games, books, anime, manga and more in one place. Log what you watch, read and play with ratings and reviews." />
    <meta name="twitter:image" content="/logo.png" />
    <script>
      (function() {
        var t = localStorage.getItem('logeverything-theme');
        if (t !== 'light' && t !== 'dark') t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
        var link = document.querySelector('link[rel="icon"]');
        if (link) link.href = t === 'dark' ? '/logo-dark.png' : '/logo.png';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
